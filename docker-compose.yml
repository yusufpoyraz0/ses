version: "3.9"

services:

  # ── Next.js web uygulaması ──────────────────────────────────────────────
  web:
    build:
      context: ./ses
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV:       production
      REDIS_URL:      redis://redis:6379
      PIPELINE_URL:   http://pipeline:8001
      STORAGE_PATH:   /data/videos
      NEXTJS_URL:     http://web:3000
    volumes:
      - video_data:/data/videos
    depends_on:
      redis:
        condition: service_healthy
      pipeline:
        condition: service_healthy
    networks:
      - internal

  # ── BullMQ Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./ses
      dockerfile: Dockerfile
    restart: always
    command: node -r ts-node/register src/lib/worker.ts
    environment:
      NODE_ENV:     production
      REDIS_URL:    redis://redis:6379
      PIPELINE_URL: http://pipeline:8001
      STORAGE_PATH: /data/videos
    volumes:
      - video_data:/data/videos
    depends_on:
      redis:
        condition: service_healthy
      pipeline:
        condition: service_healthy
    networks:
      - internal

  # ── Python AI Pipeline ──────────────────────────────────────────────────
  pipeline:
    build:
      context: ./ses/pipeline
      dockerfile: Dockerfile
    restart: always
    environment:
      STORAGE_PATH: /data/videos
      NEXTJS_URL:   http://web:3000
      DEVICE:       cpu
    volumes:
      - video_data:/data/videos
      - model_cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # Model indirme için uzun süre
    deploy:
      resources:
        limits:
          memory: 6G
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Nginx reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl_certs:/etc/letsencrypt:ro
      - video_data:/data/videos:ro
    depends_on:
      - web
    networks:
      - internal

volumes:
  video_data:    # İşlenen videolar
  redis_data:    # Job queue kalıcılığı
  model_cache:   # AI modeller (~4GB, ilk deploy'da indirilir)
  ssl_certs:     # Let's Encrypt sertifikaları

networks:
  internal:
    driver: bridge
