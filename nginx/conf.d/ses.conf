# nginx/conf.d/ses.conf
# ses.net.tr için reverse proxy
#
# SSL KURULUMU (ilk deploy'dan sonra):
#   1. Önce HTTP bloğunu aktif bırak (443 bloğu yorum satırı)
#   2. docker compose up -d nginx
#   3. docker compose run --rm certbot certonly \
#        --webroot -w /var/www/certbot \
#        -d ses.net.tr -d www.ses.net.tr
#   4. HTTP bloğunda redirect'i etkinleştir, HTTPS bloğunu aç
#   5. docker compose exec nginx nginx -s reload

# ── Upstream tanımları ────────────────────────────────────────────────────
upstream nextjs_upstream {
    server nextjs:3000;
    keepalive 32;
}

# ── HTTP: Let's Encrypt doğrulama + HTTPS yönlendirme ────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ses.net.tr www.ses.net.tr;

    # Certbot webroot doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SSL kurulumundan sonra aşağıdaki bloğu aç, yukarıdakileri koru:
    # location / {
    #     return 301 https://ses.net.tr$request_uri;
    # }

    # SSL kurulana kadar geçici olarak Next.js'e proxy yap:
    location / {
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

